<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Meridian — The Duo: Bakuchiol Renewal Oil and 12% Vitamin C Serum">
  <defs>
    <!-- Warm cream background gradient -->
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="60%" stop-color="#F0EBDD"/>
      <stop offset="100%" stop-color="#E5DFCE"/>
    </radialGradient>

    <!-- Champagne / sand bottle body -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#A89878"/>
      <stop offset="20%" stop-color="#C9BC9B"/>
      <stop offset="50%" stop-color="#D6CBA9"/>
      <stop offset="80%" stop-color="#B8AB89"/>
      <stop offset="100%" stop-color="#897C5E"/>
    </linearGradient>

    <!-- Slightly cooler body for the second bottle (visual differentiation) -->
    <linearGradient id="bodyGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#9C8E72"/>
      <stop offset="20%" stop-color="#C0B393"/>
      <stop offset="50%" stop-color="#CCC1A1"/>
      <stop offset="80%" stop-color="#AFA382"/>
      <stop offset="100%" stop-color="#7E725A"/>
    </linearGradient>

    <!-- Charcoal cap gradient -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#0A0A0C"/>
      <stop offset="35%" stop-color="#1F1F22"/>
      <stop offset="55%" stop-color="#2A2A2E"/>
      <stop offset="80%" stop-color="#15151A"/>
      <stop offset="100%" stop-color="#040404"/>
    </linearGradient>

    <!-- Subtle vertical highlight inside body (glass / curved surface look) -->
    <linearGradient id="bodyShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom shadow under bottles -->
    <radialGradient id="bottomShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter for bottles -->
    <filter id="bottleShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Floor shadow ellipse beneath both bottles -->
  <ellipse cx="250" cy="408" rx="170" ry="14" fill="url(#bottomShadow)"/>

  <!-- ==================== BOTTLE 2 (back, behind) — Vitamin C Serum (pump) ==================== -->
  <g filter="url(#bottleShadow)" transform="translate(285,68)">
    <!-- Pump cap shoulders (rectangular cap base) -->
    <rect x="20" y="60" width="86" height="22" rx="2" fill="url(#capGrad)"/>
    <!-- Pump cap upper -->
    <rect x="28" y="38" width="70" height="22" rx="2" fill="url(#capGrad)"/>
    <!-- Pump nozzle -->
    <rect x="56" y="20" width="14" height="20" rx="1.5" fill="#0A0A0C"/>
    <!-- Pump spout -->
    <rect x="40" y="32" width="34" height="5" rx="1" fill="#0A0A0C"/>
    <!-- Glass collar -->
    <rect x="22" y="80" width="82" height="6" fill="#7C7158"/>
    <!-- Bottle body -->
    <rect x="14" y="86" width="98" height="248" rx="3" fill="url(#bodyGrad2)"/>
    <!-- Inner shine highlight -->
    <rect x="14" y="86" width="98" height="248" rx="3" fill="url(#bodyShine)"/>
    <!-- Subtle right-edge dark line -->
    <rect x="108" y="86" width="2" height="248" fill="#000" fill-opacity="0.10"/>
    <rect x="14" y="86" width="2" height="248" fill="#FFF" fill-opacity="0.18"/>

    <!-- Mono label centered in body -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1A1A1C" text-anchor="middle">
      <text x="63" y="180" font-size="6.4" letter-spacing="2.0">M·E·R·I·D·I·A·N</text>
      <line x1="38" y1="190" x2="88" y2="190" stroke="#1A1A1C" stroke-width="0.6" stroke-opacity="0.55"/>
      <text x="63" y="218" font-size="13" letter-spacing="0.6" font-weight="500">VITAMIN&#160;C</text>
      <text x="63" y="234" font-size="9.5" letter-spacing="1.2">12% L-ASCORBIC</text>
      <text x="63" y="270" font-size="6.4" letter-spacing="1.4" fill-opacity="0.7">SERUM · 30ML</text>
    </g>

    <!-- Bottom rim shadow -->
    <rect x="14" y="328" width="98" height="6" rx="2" fill="#000" fill-opacity="0.18"/>
  </g>

  <!-- ==================== BOTTLE 1 (front) — Bakuchiol Renewal Oil (dropper) ==================== -->
  <g filter="url(#bottleShadow)" transform="translate(105,88)">
    <!-- Dropper bulb (rubber teat at top) -->
    <ellipse cx="63" cy="14" rx="22" ry="14" fill="url(#capGrad)"/>
    <!-- Dropper neck -->
    <rect x="51" y="20" width="24" height="14" rx="2" fill="url(#capGrad)"/>
    <!-- Dropper screw cap -->
    <rect x="20" y="34" width="86" height="34" rx="2" fill="url(#capGrad)"/>
    <!-- Cap micro ridges -->
    <g fill="#3A3A40" fill-opacity="0.55">
      <rect x="22" y="40" width="82" height="0.7"/>
      <rect x="22" y="46" width="82" height="0.7"/>
      <rect x="22" y="52" width="82" height="0.7"/>
      <rect x="22" y="58" width="82" height="0.7"/>
    </g>
    <!-- Glass collar -->
    <rect x="22" y="68" width="82" height="6" fill="#7C7158"/>
    <!-- Bottle body -->
    <rect x="14" y="74" width="98" height="244" rx="3" fill="url(#bodyGrad)"/>
    <!-- Inner shine highlight -->
    <rect x="14" y="74" width="98" height="244" rx="3" fill="url(#bodyShine)"/>
    <!-- Subtle dropper glass tube hint inside -->
    <rect x="59" y="74" width="8" height="120" rx="2" fill="#000" fill-opacity="0.06"/>
    <rect x="62" y="74" width="2" height="160" fill="#000" fill-opacity="0.10"/>
    <!-- Edge shading -->
    <rect x="108" y="74" width="2" height="244" fill="#000" fill-opacity="0.10"/>
    <rect x="14"  y="74" width="2" height="244" fill="#FFF" fill-opacity="0.18"/>

    <!-- Mono label -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1A1A1C" text-anchor="middle">
      <text x="63" y="178" font-size="6.4" letter-spacing="2.0">M·E·R·I·D·I·A·N</text>
      <line x1="38" y1="188" x2="88" y2="188" stroke="#1A1A1C" stroke-width="0.6" stroke-opacity="0.55"/>
      <text x="63" y="216" font-size="13" letter-spacing="0.6" font-weight="500">BAKUCHIOL</text>
      <text x="63" y="232" font-size="9.5" letter-spacing="1.2">0.5% RENEWAL</text>
      <text x="63" y="270" font-size="6.4" letter-spacing="1.4" fill-opacity="0.7">FACE OIL · 30ML</text>
    </g>

    <!-- Bottom rim -->
    <rect x="14" y="312" width="98" height="6" rx="2" fill="#000" fill-opacity="0.18"/>
  </g>
</svg>
