<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Meridian Restorative Cleanser — 150ml pump bottle">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="60%" stop-color="#F0EBDD"/>
      <stop offset="100%" stop-color="#E5DFCE"/>
    </radialGradient>

    <linearGradient id="bottleBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#A89878"/>
      <stop offset="20%" stop-color="#C9BC9B"/>
      <stop offset="50%" stop-color="#D6CBA9"/>
      <stop offset="80%" stop-color="#B8AB89"/>
      <stop offset="100%" stop-color="#897C5E"/>
    </linearGradient>

    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#0A0A0C"/>
      <stop offset="35%" stop-color="#1F1F22"/>
      <stop offset="55%" stop-color="#2A2A2E"/>
      <stop offset="80%" stop-color="#15151A"/>
      <stop offset="100%" stop-color="#040404"/>
    </linearGradient>

    <linearGradient id="bodyShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="bottomShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.34"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <filter id="bottleShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dx="3" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Floor shadow -->
  <ellipse cx="250" cy="432" rx="115" ry="11" fill="url(#bottomShadow)"/>

  <!-- ==================== TALL PUMP BOTTLE ==================== -->
  <g filter="url(#bottleShadow)" transform="translate(170,22)">
    <!-- Pump nozzle (curved spout pointing forward) -->
    <path d="M 60 14 Q 60 6 70 6 L 92 6 Q 102 6 102 14 L 102 26 L 78 26 L 78 38 L 60 38 Z"
          fill="url(#capGrad)"/>
    <!-- Pump tower / cap -->
    <rect x="50" y="38" width="60" height="34" rx="2" fill="url(#capGrad)"/>
    <!-- Pump base (wider collar) -->
    <rect x="34" y="72" width="92" height="20" rx="2" fill="url(#capGrad)"/>
    <!-- Glass collar -->
    <rect x="36" y="92" width="88" height="6" fill="#7C7158"/>

    <!-- Bottle body (slim and tall) -->
    <rect x="28" y="98" width="104" height="298" rx="6" fill="url(#bottleBody)"/>
    <!-- Inner shine -->
    <rect x="28" y="98" width="104" height="298" rx="6" fill="url(#bodyShine)"/>
    <!-- Edge shading -->
    <rect x="128" y="98" width="4" height="298" fill="#000" fill-opacity="0.10"/>
    <rect x="28"  y="98" width="4" height="298" fill="#FFF" fill-opacity="0.20"/>
    <!-- Bottom rim -->
    <rect x="28" y="390" width="104" height="6" rx="2" fill="#000" fill-opacity="0.18"/>

    <!-- Mono label centered -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1A1A1C" text-anchor="middle">
      <text x="80" y="218" font-size="7" letter-spacing="2.2">M·E·R·I·D·I·A·N</text>
      <line x1="50" y1="228" x2="110" y2="228" stroke="#1A1A1C" stroke-width="0.6" stroke-opacity="0.55"/>
      <text x="80" y="256" font-size="12.5" letter-spacing="0.8" font-weight="500">RESTORATIVE</text>
      <text x="80" y="274" font-size="12.5" letter-spacing="0.8" font-weight="500">CLEANSER</text>
      <text x="80" y="296" font-size="9" letter-spacing="1.3">PH 5.5 · NIACINAMIDE</text>
      <text x="80" y="332" font-size="6.6" letter-spacing="1.5" fill-opacity="0.7">GEL CLEANSER · 150ML</text>
    </g>
  </g>
</svg>
