<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Meridian Eye Renewal Cream — 15ml jar">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="60%" stop-color="#F0EBDD"/>
      <stop offset="100%" stop-color="#E5DFCE"/>
    </radialGradient>

    <!-- Champagne body, more horizontal because it's a jar -->
    <linearGradient id="jarBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#A89878"/>
      <stop offset="20%" stop-color="#C9BC9B"/>
      <stop offset="50%" stop-color="#D6CBA9"/>
      <stop offset="80%" stop-color="#B8AB89"/>
      <stop offset="100%" stop-color="#897C5E"/>
    </linearGradient>

    <linearGradient id="jarLid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#0A0A0C"/>
      <stop offset="35%" stop-color="#1F1F22"/>
      <stop offset="55%" stop-color="#2A2A2E"/>
      <stop offset="80%" stop-color="#15151A"/>
      <stop offset="100%" stop-color="#040404"/>
    </linearGradient>

    <linearGradient id="jarTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16161A"/>
      <stop offset="50%" stop-color="#0E0E12"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>

    <linearGradient id="bodyShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="bottomShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.34"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <filter id="jarShadow" x="-30%" y="-15%" width="160%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="2" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Floor shadow -->
  <ellipse cx="250" cy="380" rx="150" ry="14" fill="url(#bottomShadow)"/>

  <!-- ==================== JAR ==================== -->
  <g filter="url(#jarShadow)" transform="translate(115,160)">
    <!-- Lid top (slight ellipse for 3D feel) -->
    <ellipse cx="135" cy="20" rx="135" ry="12" fill="url(#jarTop)"/>
    <!-- Lid sides (ridged screw lid) -->
    <rect x="0" y="20" width="270" height="42" fill="url(#jarLid)"/>
    <!-- Lid ridges -->
    <g fill="#3A3A40" fill-opacity="0.55">
      <rect x="6" y="28" width="258" height="0.8"/>
      <rect x="6" y="36" width="258" height="0.8"/>
      <rect x="6" y="44" width="258" height="0.8"/>
      <rect x="6" y="52" width="258" height="0.8"/>
    </g>
    <!-- Lid bottom shadow -->
    <ellipse cx="135" cy="62" rx="135" ry="6" fill="#000" fill-opacity="0.45"/>

    <!-- Jar body shoulder seal -->
    <rect x="6" y="62" width="258" height="6" fill="#7C7158"/>
    <!-- Jar body -->
    <rect x="0" y="68" width="270" height="118" rx="4" fill="url(#jarBody)"/>
    <!-- Inner shine highlight -->
    <rect x="0" y="68" width="270" height="118" rx="4" fill="url(#bodyShine)"/>
    <!-- Edge shading -->
    <rect x="266" y="68" width="4" height="118" fill="#000" fill-opacity="0.10"/>
    <rect x="0"   y="68" width="4" height="118" fill="#FFF" fill-opacity="0.18"/>
    <!-- Bottom rim -->
    <rect x="0" y="180" width="270" height="6" rx="2" fill="#000" fill-opacity="0.18"/>

    <!-- Mono label centered -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1A1A1C" text-anchor="middle">
      <text x="135" y="100" font-size="7.5" letter-spacing="2.4">M·E·R·I·D·I·A·N</text>
      <line x1="105" y1="110" x2="165" y2="110" stroke="#1A1A1C" stroke-width="0.7" stroke-opacity="0.55"/>
      <text x="135" y="138" font-size="18" letter-spacing="0.6" font-weight="500">EYE RENEWAL</text>
      <text x="135" y="156" font-size="10" letter-spacing="1.3">BAKUCHIOL · CAFFEINE</text>
      <text x="135" y="176" font-size="7" letter-spacing="1.5" fill-opacity="0.7">EYE CREAM · 15ML</text>
    </g>
  </g>
</svg>
